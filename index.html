  <body>
    <div id="root"></div>
    <div id="error-display" style="position:fixed; top:10px; left:10px; background:rgba(255,0,0,0.9); color:white; padding:20px; border-radius:8px; font-family:monospace; font-size:14px; z-index:999999; display:none; max-width:90%; overflow-x:auto;"></div>
    <script>
      window.addEventListener('error', function(event) {
        var display = document.getElementById('error-display');
        if (display) {
          display.style.display = 'block';
          display.innerText = 'Error: ' + event.message + '\nAt: ' + event.filename + ':' + event.lineno;
        }
      });
      window.addEventListener('unhandledrejection', function(event) {
        var display = document.getElementById('error-display');
        if (display) {
          display.style.display = 'block';
          display.innerText = 'Promise Rejection: ' + event.reason;
        }
      });
    </script>
  </body>
